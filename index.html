<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>席替えメーカー Ultra Max V2 (GitHub版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dragging { opacity: 0.5; transform: scale(0.95); z-index: 100; }
        .drag-over { border: 3px dashed #4f46e5 !important; background-color: #eef2ff !important; }
        #seatingGrid div { transition: all 0.2s ease-out; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <div class="container mx-auto p-4 max-w-7xl">
        <header class="text-center my-4">
            <h1 class="text-3xl font-extrabold text-indigo-600 tracking-tight">🏫 席替えメーカー Web App (GitHub Pages版)</h1>
            <p class="text-slate-500 mt-1 text-sm">右下空席固定、ドラッグ微調整、特定ペア、前2列優先、男女キープを維持し、前回の回避範囲を選択可能にしました。</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 lg:col-span-1 flex flex-col gap-4 max-h-[88vh] overflow-y-auto">
                
                <section class="bg-slate-50/50 p-3 rounded-xl border border-slate-100">
                    <h2 class="text-xs font-bold text-slate-700 uppercase tracking-wider mb-2 flex items-center gap-1">⚙️ 基本設定</h2>
                    <div class="space-y-2">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400">横の列数</label>
                            <input type="number" id="colsInput" value="6" min="1" max="12" class="w-full border border-slate-300 rounded-lg p-1.5 text-xs focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400">名簿確認 (現在：<span id="studentCount" class="text-indigo-600 font-bold">0</span>名)</label>
                            <textarea id="studentsInput" class="w-full border border-slate-300 rounded-lg p-1.5 text-xs focus:ring-2 focus:ring-indigo-500 outline-none h-16 shadow-inner" placeholder="名簿を同期してください"></textarea>
                        </div>
                    </div>
                </section>

                <section class="bg-slate-50/50 p-3 rounded-xl border border-slate-100">
                    <h2 class="text-xs font-bold text-slate-700 uppercase tracking-wider mb-2 flex items-center gap-1">👫 男女配置パターン（自動色付け）</h2>
                    <div class="grid grid-cols-2 gap-1.5">
                        <button onclick="applyGenderPattern('column')" class="text-[11px] font-bold bg-blue-50 text-blue-700 border border-blue-200 py-1.5 rounded-lg hover:bg-blue-100 transition">列ごとに男女</button>
                        <button onclick="applyGenderPattern('checker')" class="text-[11px] font-bold bg-rose-50 text-rose-700 border border-rose-200 py-1.5 rounded-lg hover:bg-rose-100 transition">市松模様</button>
                        <button onclick="applyGenderPattern('random')" class="text-[11px] font-bold bg-slate-100 text-slate-700 border border-slate-200 py-1.5 rounded-lg hover:bg-slate-200 transition">ランダム色付け</button>
                        <button onclick="applyGenderPattern('clear')" class="text-[11px] font-bold bg-white text-slate-400 border border-slate-200 py-1.5 rounded-lg hover:bg-slate-50 transition">色をリセット</button>
                    </div>
                </section>

                <section class="bg-slate-50/50 p-3 rounded-xl border border-slate-100 space-y-2">
                    <h2 class="text-xs font-bold text-slate-700 uppercase tracking-wider mb-1 flex items-center gap-1">🔗 特定ペアの距離指定</h2>
                    <div class="p-2 bg-white rounded-lg border border-slate-200">
                        <span class="text-[10px] font-extrabold text-emerald-600">💚 近づける（指定マス以内）</span>
                        <div class="grid grid-cols-3 gap-1 mt-1">
                            <input type="text" id="nearA" placeholder="名前1" class="border rounded-md p-1 text-xs outline-none focus:border-indigo-500">
                            <input type="text" id="nearB" placeholder="名前2" class="border rounded-md p-1 text-xs outline-none focus:border-indigo-500">
                            <select id="nearDist" class="border rounded-md p-1 text-xs bg-slate-50">
                                <option value="1">1マス以内(隣)</option>
                                <option value="2" selected>2マス以内</option>
                                <option value="3">3マス以内</option>
                            </select>
                        </div>
                    </div>
                    <div class="p-2 bg-white rounded-lg border border-slate-200">
                        <span class="text-[10px] font-extrabold text-rose-600">💔 遠ざける（指定マス以上）</span>
                        <div class="grid grid-cols-3 gap-1 mt-1">
                            <input type="text" id="farA" placeholder="名前1" class="border rounded-md p-1 text-xs outline-none focus:border-indigo-500">
                            <input type="text" id="farB" placeholder="名前2" class="border rounded-md p-1 text-xs outline-none focus:border-indigo-500">
                            <select id="farDist" class="border rounded-md p-1 text-xs bg-slate-50">
                                <option value="2">2マス以上</option>
                                <option value="3" selected>3マス以上</option>
                                <option value="4">4マス以上</option>
                            </select>
                        </div>
                    </div>
                </section>

                <section class="bg-slate-50/50 p-3 rounded-xl border border-slate-100 space-y-2">
                    <h2 class="text-xs font-bold text-slate-700 uppercase tracking-wider mb-1 flex items-center gap-1">⏳ 前回座席の考慮</h2>
                    <label class="flex items-center gap-2 cursor-pointer font-bold text-xs text-indigo-700 bg-indigo-50 p-2 rounded-lg border border-indigo-100">
                        <input type="checkbox" id="ruleAvoidPast" class="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4">
                        <span>前回の近くの人とは近くしない</span>
                    </label>
                    
                    <div class="bg-white p-2 rounded-lg border border-slate-200 space-y-1 text-[11px] font-bold text-slate-600">
                        <span class="block text-[9px] text-slate-400 uppercase tracking-wider mb-0.5">回避する範囲の選択：</span>
                        <label class="flex items-center gap-1.5 cursor-pointer text-indigo-600">
                            <input type="radio" name="avoidRange" value="4" checked class="text-indigo-600 focus:ring-indigo-500">
                            <span>隣と前後のみ (前後左右の4方向) ★おすすめ</span>
                        </label>
                        <label class="flex items-center gap-1.5 cursor-pointer">
                            <input type="radio" name="avoidRange" value="8" class="text-indigo-600 focus:ring-indigo-500">
                            <span>周囲8人全員 (斜めも含む)</span>
                        </label>
                    </div>

                    <div>
                        <label class="block text-[9px] text-slate-400 font-bold">前回座席のデータコード</label>
                        <textarea id="pastLayoutInput" class="w-full border border-slate-300 rounded-lg p-1.5 text-[10px] h-12 shadow-inner focus:ring-2 focus:ring-indigo-500 outline-none font-mono" placeholder="前回のコードをここに貼り付け"></textarea>
                    </div>
                </section>

                <section class="bg-slate-50/50 p-3 rounded-xl border border-slate-100">
                    <h2 class="text-xs font-bold text-slate-700 uppercase tracking-wider mb-2 flex items-center gap-1">👓 視力・移動ルール</h2>
                    <div class="space-y-2">
                        <div>
                            <label class="block text-[10px] font-bold text-amber-700">前2列に優先配置する生徒</label>
                            <textarea id="priorityInput" class="w-full border border-amber-200 bg-amber-50/30 rounded-lg p-1.5 text-xs focus:ring-2 focus:ring-amber-500 outline-none h-12 shadow-inner" placeholder="名前を改行区切りで入力"></textarea>
                        </div>
                        <div class="bg-white p-2 rounded-lg border border-slate-200 space-y-1.5 text-xs font-medium">
                            <label class="flex items-center gap-2 cursor-pointer text-slate-700">
                                <input type="radio" name="genderRule" id="ruleKeepGender" class="text-indigo-600 focus:ring-indigo-500">
                                <span>男女パターン(色)をキープ</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer text-slate-700">
                                <input type="radio" name="genderRule" id="ruleIgnoreGender" checked class="text-indigo-600 focus:ring-indigo-500">
                                <span class="font-bold text-indigo-600">完全ランダム (右下空席死守)</span>
                            </label>
                            <hr class="my-1 border-slate-100">
                            <label class="flex items-center gap-2 cursor-pointer text-slate-700">
                                <input type="checkbox" id="ruleMustMove" checked class="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4">
                                <span>🔄 前の席から必ず移動</span>
                            </label>
                        </div>
                    </div>
                </section>

                <button id="shuffleBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-indigo-100 transition duration-150 active:scale-95 text-base">
                    席替えを実行する！
                </button>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 lg:col-span-2 flex flex-col items-center">
                <div class="w-full flex justify-between items-end mb-4 gap-2">
                    <div>
                        <h2 class="text-lg font-bold text-slate-700">座席表 (6列×7行)</h2>
                        <p class="text-[10px] text-slate-400 font-bold italic">※ 右下の2マスは固定空席です。席替え後はドラッグで自由に入れ替え可能です。</p>
                    </div>
                    <div class="flex gap-3 text-[11px] font-bold shrink-0">
                        <div class="flex items-center gap-1"><span class="w-3 h-3 bg-blue-200 border border-blue-300 rounded-sm"></span>男子</div>
                        <div class="flex items-center gap-1"><span class="w-3 h-3 bg-rose-200 border border-rose-300 rounded-sm"></span>女子</div>
                    </div>
                </div>
                
                <div class="w-full max-w-md bg-slate-200 text-center py-2 rounded-xl mb-6 font-extrabold text-slate-600 border-b-4 border-slate-300 text-sm tracking-[1em] pl-4 shadow-inner">教卓</div>

                <div class="w-full overflow-x-auto pb-4 flex justify-center">
                    <div id="seatingGrid" class="grid gap-3 min-w-[550px] w-full max-w-3xl px-2"></div>
                </div>
                <div id="statusMessage" class="mt-2 h-6 text-sm text-center font-bold relative w-full"></div>

                <section class="mt-6 w-full border-t border-slate-200 pt-4">
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">💾 座席データのインポート / エクスポート</h3>
                    <div class="flex gap-2 mb-2">
                        <button onclick="exportData()" class="bg-slate-700 hover:bg-slate-800 text-white text-[11px] font-bold py-2 px-3 rounded-xl transition shadow-sm">
                            現在の座席コードをエクスポート（コピー）
                        </button>
                        <button onclick="importData()" class="bg-indigo-50 hover:bg-indigo-600 text-white text-[11px] font-bold py-2 px-3 rounded-xl transition shadow-sm">
                            下のコードを座席表にインポート（復元）
                        </button>
                    </div>
                    <textarea id="ioTextArea" class="w-full border border-slate-300 rounded-xl p-2 text-[10px] h-12 shadow-inner focus:ring-2 focus:ring-indigo-500 outline-none font-mono bg-slate-50/50" placeholder="ここに生成されたバックアップコードが出力されます。"></textarea>
                </section>
            </div>
        </div>
    </div>

    <div id="fixedModal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-3xl shadow-2xl max-w-sm w-full border border-white">
            <h3 class="text-base font-bold mb-3 text-slate-800 flex items-center gap-2">📌 座席の固定</h3>
            <select id="modalSelect" class="w-full border border-slate-300 rounded-xl p-3 bg-slate-50 text-sm mb-5 focus:ring-2 focus:ring-indigo-500 outline-none shadow-inner"></select>
            <div class="flex justify-end gap-2 text-xs font-bold">
                <button id="modalCancel" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-4 py-3 rounded-xl transition">キャンセル</button>
                <button id="modalClear" class="bg-rose-50 hover:bg-rose-100 text-rose-600 px-4 py-3 rounded-xl transition text-[10px]">固定を解除</button>
                <button id="modalApply" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-3 rounded-xl transition">確定</button>
            </div>
        </div>
    </div>

    <script>
        // 【GitHub Pages対応】先ほどコピーしたGASのウェブアプリURLをここに貼り付けます
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxWo-b_SOqxPaGfjbGEyddPWOCalfKDLlh0vNtPkNCPQd-acIdK4dCqRPxzoFhkSLyAPw/exec";

        let students = [];
        let cols = 6;
        let totalSeats = 42; 
        let fixedSeats = {}; 
        let seatGenders = {}; 
        let studentGenderMap = {}; 
        let currentLayout = []; 
        let draggedIndex = null;
        let isShuffling = false;
        let pastNeighbors = {}; 

        const colsInput = document.getElementById('colsInput');
        const studentsInput = document.getElementById('studentsInput');
        const seatingGrid = document.getElementById('seatingGrid');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const fixedModal = document.getElementById('fixedModal');
        const modalSelect = document.getElementById('modalSelect');
        const statusMessage = document.getElementById('statusMessage');
        const studentCountSpan = document.getElementById('studentCount');

        // GitHub Pages起動時に自動でGAS APIから名簿を取得する処理
        function init() {
            setLoadingStatus(true, "⌛ スプレッドシート同期中...");
            
            fetch(GAS_API_URL)
                .then(response => response.json())
                .then(data => {
                    if (data.error) { setLoadingStatus(false); alert("GASエラー: " + data.error); return; }
                    colsInput.value = 6;
                    studentsInput.value = data.students.join('\n');
                    
                    studentGenderMap = {};
                    for (let i = 0; i < data.students.length; i++) {
                        let g = String(data.genders[i] || '').trim();
                        if (g === '男' || g === '男性' || g.toLowerCase() === 'm' || g.toLowerCase() === 'male') {
                            studentGenderMap[data.students[i]] = 'male';
                        } else if (g === '女' || g === '女性' || g.toLowerCase() === 'f' || g.toLowerCase() === 'female') {
                            studentGenderMap[data.students[i]] = 'female';
                        } else {
                            studentGenderMap[data.students[i]] = 'none';
                        }
                    }
                    
                    setLoadingStatus(false, "✅ データ同期完了。", "emerald");
                    updateData(true);
                    renderGrid();
                })
                .catch(err => { 
                    setLoadingStatus(false); 
                    alert("通信失敗: GASのデプロイ設定が「全員」になっているか、URLが正しいか確認してください。\n詳細: " + err.message); 
                });
        }

        function updateData(isFirstLoad = false) {
            cols = parseInt(colsInput.value) || 6;
            students = studentsInput.value.split('\n').map(n => n.trim()).filter(n => n !== "");
            studentCountSpan.textContent = students.length;

            totalSeats = Math.ceil(students.length / cols) * cols;
            if (totalSeats < cols) totalSeats = cols;

            if (!isShuffling) {
                currentLayout = Array(totalSeats).fill(null);
                if (isFirstLoad) {
                    for (let i = 0; i < students.length; i++) currentLayout[i] = students[i];
                    for (let i = students.length; i < totalSeats; i++) currentLayout[i] = '（空席）';
                } else {
                    for (let seatIdx in fixedSeats) { 
                        if (parseInt(seatIdx) < totalSeats) currentLayout[seatIdx] = fixedSeats[seatIdx]; 
                    }
                }
            }

            const safeSeatsCount = students.length; 
            for (let i = 0; i < totalSeats; i++) {
                if (isFirstLoad) {
                    const student = currentLayout[i];
                    if (i < safeSeatsCount && student && studentGenderMap[student]) {
                        seatGenders[i] = studentGenderMap[student];
                    } else {
                        seatGenders[i] = 'none';
                    }
                } else if (!seatGenders[i]) {
                    seatGenders[i] = 'none';
                }
                if (i >= safeSeatsCount) seatGenders[i] = 'none';
            }
        }

        function areNeighbors(idx1, idx2, rangeMode) {
            const r1 = Math.floor(idx1 / cols);
            const c1 = idx1 % cols;
            const r2 = Math.floor(idx2 / cols);
            const c2 = idx2 % cols;
            
            if (rangeMode === '8') {
                return Math.max(Math.abs(r1 - r2), Math.abs(c1 - c2)) <= 1;
            } else {
                return (Math.abs(r1 - r2) + Math.abs(c1 - c2)) === 1;
            }
        }

        function getDistance(idx1, idx2) {
            const r1 = Math.floor(idx1 / cols);
            const c1 = idx1 % cols;
            const r2 = Math.floor(idx2 / cols);
            const c2 = idx2 % cols;
            return Math.max(Math.abs(r1 - r2), Math.abs(c1 - c2));
        }

        function applyGenderPattern(type) {
            updateData();
            const safeSeatsCount = students.length; 

            for (let i = 0; i < totalSeats; i++) {
                if (i >= safeSeatsCount) { seatGenders[i] = 'none'; continue; }
                const row = Math.floor(i / cols);
                const col = i % cols;
                
                if (type === 'column') seatGenders[i] = (col % 2 === 0) ? 'male' : 'female';
                else if (type === 'checker') seatGenders[i] = ((row + col) % 2 === 0) ? 'male' : 'female';
                else if (type === 'random') {
                    const gs = Object.values(studentGenderMap).sort(() => Math.random() - 0.5);
                    seatGenders[i] = gs[i] || 'none';
                } else if (type === 'clear') seatGenders[i] = 'none';
            }
            renderGrid();
        }

        function exportData() {
            const data = { layout: currentLayout, genders: seatGenders, fixed: fixedSeats };
            const jsonStr = JSON.stringify(data);
            const ioTextArea = document.getElementById('ioTextArea');
            ioTextArea.value = jsonStr;
            ioTextArea.select();
            navigator.clipboard.writeText(jsonStr);
            alert("現在の座席データをコード化してクリップボードにコピーしました！");
        }

        function importData() {
            const jsonText = document.getElementById('ioTextArea').value.trim();
            if (!jsonText) { alert("インポートするコードを入力欄に貼り付けてください。"); return; }
            try {
                const data = JSON.parse(jsonText);
                if (data.layout && data.genders) {
                    currentLayout = data.layout;
                    seatGenders = data.genders;
                    fixedSeats = data.fixed || {};
                    renderGrid();
                    alert("座席データを完全に復元しました！");
                } else { alert("データの形式が不正です。"); }
            } catch(e) { alert("コードの解析に失敗しました。"); }
        }

        function handleDragStart(e) { if (isShuffling) return; draggedIndex = parseInt(e.currentTarget.dataset.index); e.currentTarget.classList.add('dragging'); }
        function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
        function handleDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
        function handleDrop(e) {
            e.preventDefault();
            const targetIndex = parseInt(e.currentTarget.dataset.index);
            e.currentTarget.classList.remove('drag-over');

            if (draggedIndex !== null && draggedIndex !== targetIndex) {
                const tempName = currentLayout[draggedIndex];
                currentLayout[draggedIndex] = currentLayout[targetIndex];
                currentLayout[targetIndex] = tempName;
                
                syncGenderColor(draggedIndex);
                syncGenderColor(targetIndex);
                renderGrid();
            }
            draggedIndex = null;
        }

        function syncGenderColor(index) {
            const name = currentLayout[index];
            const safeSeatsCount = students.length;
            if (index >= safeSeatsCount || !name || name === '（空席）') { seatGenders[index] = 'none'; } 
            else { seatGenders[index] = studentGenderMap[name] || 'none'; }
        }

        function renderGrid() {
            seatingGrid.innerHTML = '';
            seatingGrid.style.gridTemplateColumns = `repeat(${cols}, minmax(0, 1fr))`;
            const safeSeatsCount = students.length; 

            for (let i = 0; i < totalSeats; i++) {
                const seatDiv = document.createElement('div');
                seatDiv.dataset.index = i;
                seatDiv.draggable = true;

                const studentName = currentLayout[i];
                const gender = seatGenders[i] || 'none';
                const isFixed = fixedSeats[i] !== undefined;

                let colorClass = 'bg-white border-slate-200 hover:border-indigo-300 hover:bg-indigo-50/50'; 
                if (gender === 'male') colorClass = 'bg-blue-50/80 border-blue-300 text-blue-900 hover:border-blue-400 hover:bg-blue-100'; 
                if (gender === 'female') colorClass = 'bg-rose-50/70 border-rose-300 text-rose-900 hover:border-rose-400 hover:bg-rose-100'; 
                
                if (!studentName || studentName === '（空席）') {
                    colorClass = 'bg-slate-100/70 border-slate-300 text-slate-400 border-dashed hover:bg-slate-100';
                }
                if (i >= safeSeatsCount) {
                    colorClass = 'bg-slate-200/50 border-slate-300 text-slate-400 border-dashed opacity-70 cursor-not-allowed';
                }

                const fixedClass = isFixed && studentName && studentName !== '（空席）' ? 'ring-2 ring-amber-500 shadow-lg' : '';
                seatDiv.className = `border rounded-2xl p-2 text-center min-h-[90px] flex flex-col justify-center items-center transition-all duration-150 shadow-sm relative cursor-grab active:cursor-grabbing ${colorClass} ${fixedClass}`;
                
                const nameSpan = document.createElement('span');
                nameSpan.textContent = studentName || '（空席）';
                nameSpan.className = `w-full font-bold text-sm leading-tight break-all ${!studentName || studentName === '（空席）' ? 'text-slate-300 font-normal italic' : ''}`;
                seatDiv.appendChild(nameSpan);

                if (isFixed && studentName && studentName !== '（空席）') {
                    seatDiv.innerHTML += `<span class="text-[8px] bg-amber-500 text-white px-1.5 py-0.5 rounded-full absolute -top-2 -right-1 font-bold shadow-md">固定</span>`;
                }

                seatDiv.addEventListener('dragstart', handleDragStart);
                seatDiv.addEventListener('dragover', handleDragOver);
                seatDiv.addEventListener('dragleave', handleDragLeave);
                seatDiv.addEventListener('drop', handleDrop);
                seatDiv.addEventListener('click', () => { if(!isShuffling) openModal(i); });
                
                seatingGrid.appendChild(seatDiv);
            }
        }

        function calculateValidLayout() {
            const oldLayout = [...currentLayout];
            const priorityNames = document.getElementById('priorityInput').value.split('\n').map(n => n.trim()).filter(n => n !== "");
            const keepGender = document.getElementById('ruleKeepGender').checked;
            const mustMove = document.getElementById('ruleMustMove').checked;
            const avoidPast = document.getElementById('ruleAvoidPast').checked;
            
            const avoidMode = document.querySelector('input[name="avoidRange"]:checked').value;

            const nA = document.getElementById('nearA').value.trim(); const nB = document.getElementById('nearB').value.trim();
            const nDist = parseInt(document.getElementById('nearDist').value);
            const fA = document.getElementById('farA').value.trim(); const fB = document.getElementById('farB').value.trim();
            const fDist = parseInt(document.getElementById('farDist').value);

            let malePool = [], femalePool = [], nonePool = [];
            students.forEach(s => {
                const g = studentGenderMap[s] || 'none';
                if (g === 'male') malePool.push(s); else if (g === 'female') femalePool.push(s); else nonePool.push(s);
            });

            const safeSeatsCount = students.length; 

            for (let seatIdx in fixedSeats) { if (parseInt(seatIdx) >= safeSeatsCount) delete fixedSeats[seatIdx]; }
            const fixedValues = Object.values(fixedSeats);
            let mP = malePool.filter(n => !fixedValues.includes(n));
            let fP = femalePool.filter(n => !fixedValues.includes(n));
            let nP = nonePool.filter(n => !fixedValues.includes(n));

            const availableIndices = [];
            for (let i = 0; i < safeSeatsCount; i++) { if (!fixedSeats[i]) availableIndices.push(i); }

            let nextLayout = Array(totalSeats).fill('（空席）');
            for (let seatIdx in fixedSeats) nextLayout[seatIdx] = fixedSeats[seatIdx];

            for (let attempt = 0; attempt < 10000; attempt++) {
                let trialLayout = [...nextLayout];

                if (keepGender) {
                    let mP_temp = [...mP].sort(() => Math.random() - 0.5);
                    let fP_temp = [...fP].sort(() => Math.random() - 0.5);
                    let nP_temp = [...nP].sort(() => Math.random() - 0.5);
                    let trialIndices = [...availableIndices].sort(() => Math.random() - 0.5);

                    trialIndices = trialIndices.filter(i => {
                        if (seatGenders[i] === 'male' && mP_temp.length > 0) { trialLayout[i] = mP_temp.shift(); return false; }
                        if (seatGenders[i] === 'female' && fP_temp.length > 0) { trialLayout[i] = fP_temp.shift(); return false; }
                        return true;
                    });
                    let remainPool = [...mP_temp, ...fP_temp, ...nP_temp].sort(() => Math.random() - 0.5);
                    for (let i of trialIndices) { trialLayout[i] = remainPool.shift() || '（空席）'; }
                } else {
                    let allPool = [...mP, ...fP, ...nP].sort(() => Math.random() - 0.5);
                    let trialIndices = [...availableIndices].sort(() => Math.random() - 0.5);
                    for (let i of trialIndices) { trialLayout[i] = allPool.shift() || '（空席）'; }
                }

                let valid = true;

                if (priorityNames.length > 0) {
                    for (let i = 0; i < safeSeatsCount; i++) {
                        if (priorityNames.includes(trialLayout[i]) && i >= cols * 2) { valid = false; break; }
                    }
                }
                if (!valid) continue;

                if (mustMove) {
                    for (let i = 0; i < safeSeatsCount; i++) {
                        if (trialLayout[i] !== '（空席）' && oldLayout[i] !== '（空席）' && oldLayout[i] && trialLayout[i] === oldLayout[i] && !fixedSeats[i]) { valid = false; break; }
                    }
                }
                if (!valid) continue;

                if (nA && nB) {
                    const idxA = trialLayout.indexOf(nA); const idxB = trialLayout.indexOf(nB);
                    if (idxA !== -1 && idxB !== -1 && getDistance(idxA, idxB) > nDist) { valid = false; }
                }
                if (!valid) continue;

                if (fA && fB) {
                    const idxC = trialLayout.indexOf(fA); const idxD = trialLayout.indexOf(fB);
                    if (idxC !== -1 && idxD !== -1 && getDistance(idxC, idxD) < fDist) { valid = false; }
                }
                if (!valid) continue;

                if (avoidPast) {
                    for (let i = 0; i < safeSeatsCount; i++) {
                        const sName = trialLayout[i];
                        if (!sName || sName === '（空席）' || !pastNeighbors[sName]) continue;
                        for (let j = 0; j < safeSeatsCount; j++) {
                            if (i === j) continue;
                            const oName = trialLayout[j];
                            
                            if (oName && oName !== '（空席）' && areNeighbors(i, j, avoidMode)) {
                                if (pastNeighbors[sName].includes(oName)) { valid = false; break; }
                            }
                        }
                        if (!valid) break;
                    }
                }
                if (!valid) continue;

                currentLayout = trialLayout;
                for (let i = 0; i < totalSeats; i++) syncGenderColor(i);
                return true;
            }
            return false;
        }

        function runShuffle() {
            updateData();
            if (students.length === 0) return;

            if (document.getElementById('ruleAvoidPast').checked) {
                try {
                    const jsonText = document.getElementById('pastLayoutInput').value.trim();
                    if (!jsonText) { alert("前回座席のデータコードを入力してください。"); return; }
                    const pastData = JSON.parse(jsonText);
                    if (pastData && pastData.layout) {
                        const pLayout = pastData.layout;
                        const avoidMode = document.querySelector('input[name="avoidRange"]:checked').value;
                        pastNeighbors = {};
                        
                        for (let i = 0; i < pLayout.length; i++) {
                            const sName = pLayout[i];
                            if (!sName || sName === '（空席）') continue;
                            pastNeighbors[sName] = [];
                            for (let j = 0; j < pLayout.length; j++) {
                                if (i === j) continue;
                                const oName = pLayout[j];
                                if (oName && oName !== '（空席）' && areNeighbors(i, j, avoidMode)) {
                                    pastNeighbors[sName].push(oName);
                                }
                            }
                        }
                    } else { alert("前回データの形式が違います。"); return; }
                } catch(e) { alert("前回データのコード解析に失敗しました。"); return; }
            }
            
            isShuffling = true;
            shuffleBtn.disabled = true;
            setLoadingStatus(true, "🎲 全条件を満たす座席を10,000通りから超高速計算中...", "indigo");

            let count = 0;
            const safeSeatsCount = students.length; 
            const animPool = [...students];

            const interval = setInterval(() => {
                animPool.sort(() => Math.random() - 0.5);
                for (let i = 0; i < safeSeatsCount; i++) currentLayout[i] = animPool[i % animPool.length];
                for (let i = safeSeatsCount; i < totalSeats; i++) currentLayout[i] = '（空席）';
                renderGrid();
                
                if (++count > 10) {
                    clearInterval(interval);
                    const success = calculateValidLayout();
                    renderGrid();
                    isShuffling = false;
                    shuffleBtn.disabled = false;
                    
                    if (success) {
                        setLoadingStatus(false, "🎉 席替え完了！すべての指定条件をクリアしました。", "emerald");
                    } else {
                        setLoadingStatus(false, "⚠️ 条件が厳しすぎて配置できません。前回条件を「隣と前後のみ」にするか、他の条件を緩めてください。", "rose");
                    }
                }
            }, 80);
        }

        function setLoadingStatus(loading, message, color = "amber") {
            statusMessage.textContent = message;
            statusMessage.className = `mt-2 h-6 text-sm text-center font-bold text-${color}-600 ${loading ? 'animate-pulse' : ''}`;
        }

        function openModal(seatIndex) {
            targetSeatIndex = seatIndex;
            const safeSeatsCount = students.length;
            if (seatIndex >= safeSeatsCount) { alert("この席は空席エリアのため固定できません。"); return; }

            modalSelect.innerHTML = '<option value="">-- 生徒を固定 --</option>';
            const fixedNames = Object.entries(fixedSeats).filter(([idx, _]) => parseInt(idx) !== seatIndex).map(([_, n]) => n);
            students.forEach(n => {
                if (!fixedNames.includes(n)) {
                    const opt = document.createElement('option'); opt.value = n; opt.textContent = n;
                    if (fixedSeats[seatIndex] === n) opt.selected = true;
                    modalSelect.appendChild(opt);
                }
            });
            fixedModal.classList.remove('hidden');
        }

        function closeModal() { fixedModal.classList.add('hidden'); }
        document.getElementById('modalCancel').addEventListener('click', closeModal);
        document.getElementById('modalClear').addEventListener('click', () => { delete fixedSeats[targetSeatIndex]; updateData(); renderGrid(); closeModal(); });
        document.getElementById('modalApply').addEventListener('click', () => { const n = modalSelect.value; if(n) fixedSeats[targetSeatIndex] = n; else delete fixedSeats[targetSeatIndex]; updateData(); renderGrid(); closeModal(); });

        shuffleBtn.addEventListener('click', runShuffle);
        colsInput.addEventListener('change', () => { updateData(); renderGrid(); });
        init();
    </script>
</body>
</html>
